modLoader = "javafml"
loaderVersion = "[4,)"
license = "${mod_license}"
issueTrackerURL = "https://github.com/Team-Arcadia/ArcadiaTweaks/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
credits = "${mod_credits}"
description = '''${mod_description}'''
logoFile = "icon.png"

[[mixins]]
config = "${mod_id}.mixins.json"

[[mixins]]
config = "${mod_id}.botany.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version}]"
ordering = "NONE"
side = "BOTH"

# BotanyPots is optional at load time - the Mixin module is only effective when
# BotanyPots is present, but ArcadiaTweaks must NOT hard-require it (umbrella mod).
[[dependencies.${mod_id}]]
modId = "botanypots"
type = "optional"
versionRange = "[0.0.0,)"
ordering = "AFTER"
side = "BOTH"
